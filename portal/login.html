<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة العميل - تسجيل الدخول | SmartBuild Palestine</title>
<meta name="description" content="بوابة العميل - سجل دخولك لمتابعة مشروعك وفواتيرك">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Tajawal:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<nav id="navbar" style="background:rgba(10,22,40,0.92);">
  <a href="../index.html" class="logo">
    <div class="logo-icon">S</div>
    <div class="logo-text"><span class="ar">سمارت بيلد</span><span class="en">SMARTBUILD.PS</span></div>
  </a>
  <ul class="nav-links" id="navLinks">
    <li><a href="../index.html">الرئيسية</a></li>
    <li><a href="../index.html#contact" class="nav-cta">تواصل معنا</a></li>
  </ul>
  <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
</nav>

<div class="portal-page">
  <div class="portal-card">
    <div class="portal-header">
      <div class="portal-logo">S</div>
      <h1 class="portal-title">بوابة العميل</h1>
      <p class="portal-subtitle">سجّل دخولك لمتابعة مشروعك وفواتيرك</p>
    </div>
    <form onsubmit="portalLogin(event)">
      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <label style="display:flex;align-items:center;gap:8px;color:var(--text-2);font-size:0.9rem;cursor:pointer;">
          <input type="checkbox" name="remember"> تذكرني
        </label>
        <a href="#" style="color:var(--accent);font-size:0.85rem;">نسيت كلمة المرور؟</a>
      </div>
      <button type="submit" class="form-submit">
        <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
      </button>
    </form>
    <div style="text-align:center;margin-top:25px;padding-top:20px;border-top:1px solid var(--border);">
      <p style="color:var(--text-2);font-size:0.9rem;">عميل جديد؟</p>
      <a href="../index.html#contact" style="color:var(--accent);font-weight:600;">اطلب مشروعك الآن →</a>
    </div>
    <div style="margin-top:20px;padding:15px;background:var(--bg);border-radius:8px;border-right:3px solid var(--accent-3);">
      <p style="color:var(--text-2);font-size:0.8rem;">
        <i class="fas fa-info-circle" style="color:var(--accent-3);"></i>
        <strong style="color:var(--text);">حساب تجريبي:</strong> سيتم تفعيل بوابة العميل بعد إنشاء حسابك عند تسليم أول مشروع.
      </p>
    </div>
  </div>
</div>
<footer style="padding:30px 5%;border-top:1px solid var(--border);">
  <div class="footer-bottom" style="border:none;padding:0;">
    <p>© 2026 SmartBuild Palestine · جميع الحقوق محفوظة · <a href="../legal/privacy.html" style="color:var(--accent);">سياسة الخصوصية</a></p>
  </div>
</footer>
<script src="../assets/js/main.js"></script>
</body>
</html>
